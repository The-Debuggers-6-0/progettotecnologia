<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 mb-0"><[form_title]></h1>
    <a href="<[back_url]>" class="btn btn-outline-secondary"><i class="fas fa-arrow-left"></i> Torna alla lista</a>
</div>

<[if!empty error]>
<div class="alert alert-danger"><[error]></div>
<[/if!empty]>

<form method="post" action="<[action_url]>" enctype="multipart/form-data">
<div class="row g-4">

    <div class="col-lg-8">
        <div class="card mb-4">
            <div class="card-header fw-semibold">Anagrafica</div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="name" class="form-label">Nome <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name"
                               value="<[guide_name]>" required>
                    </div>
                    <div class="col-md-6">
                        <label for="surname" class="form-label">Cognome <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="surname" name="surname"
                               value="<[guide_surname]>" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="bio" class="form-label">Biografia</label>
                    <textarea class="form-control" id="bio" name="bio" rows="4"><[guide_bio]></textarea>
                </div>
                <div class="mb-3">
                    <label for="languages" class="form-label">Lingue parlate</label>
                    <input type="text" class="form-control" id="languages" name="languages"
                           value="<[guide_languages]>" placeholder="es. Italiano, Inglese, Francese">
                </div>
            </div>
        </div>
    </div>

    <div class="col-lg-4">
        <div class="card mb-4">
            <div class="card-header fw-semibold">Contatti</div>
            <div class="card-body">
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email"
                           value="<[guide_email]>">
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label">Telefono</label>
                    <input type="text" class="form-control" id="phone" name="phone"
                           value="<[guide_phone]>">
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="is_active"
                           name="is_active" value="1" <[guide_active]>>
                    <label class="form-check-label" for="is_active">Guida attiva</label>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header fw-semibold">Foto profilo</div>
            <div class="card-body">
                <[photo_preview]>
                <input type="file" class="form-control" name="photo"
                       accept="image/jpeg,image/png,image/webp">
                <div class="form-text">JPG, PNG o WebP, max 5 MB.</div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100">Salva guida</button>
    </div>

</div>
</form>
