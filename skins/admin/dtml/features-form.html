<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 mb-0"><[form_title]></h1>
    <a href="<[back_url]>" class="btn btn-outline-secondary"><i class="fas fa-arrow-left"></i> Torna alla lista</a>
</div>

<[if!empty error]>
<div class="alert alert-danger"><[error]></div>
<[/if!empty]>

<div class="card">
    <div class="card-body">
        <form method="post" action="<[action_url]>">

            <div class="row">
                <div class="col-md-8">
                    <div class="mb-3">
                        <label for="title" class="form-label fw-semibold">Titolo <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="title" name="title"
                               value="<[feat_title]>" required>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="sort_order" class="form-label fw-semibold">Ordine</label>
                        <input type="number" class="form-control" id="sort_order" name="sort_order"
                               value="<[feat_order]>" min="0">
                        <small class="text-muted">1 = alto&#8209;sx, 2 = alto&#8209;dx, 3 = basso&#8209;sx, 4 = basso&#8209;dx</small>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label fw-semibold">Testo</label>
                <textarea class="form-control" id="description" name="description" rows="3"><[feat_description]></textarea>
            </div>

            <div class="mb-4">
                <label for="icon" class="form-label fw-semibold">Icona</label>
                <div class="d-flex align-items-center gap-3">
                    <select class="form-select" id="icon" name="icon" style="max-width:320px;">
                        <[icon_options]>
                    </select>
                    <span class="border rounded d-inline-flex align-items-center justify-content-center"
                          style="width:64px;height:64px;">
                        <span id="iconPreview" class="<[feat_icon]>" style="font-size:2.2rem;color:#1A374D;"></span>
                    </span>
                </div>
                <small class="text-muted">L'anteprima mostra l'icona come apparir&agrave; in homepage.</small>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Salva</button>
                <a href="<[back_url]>" class="btn btn-outline-secondary">Annulla</a>
            </div>
        </form>
    </div>
</div>

<script>
(function () {
    var select  = document.getElementById('icon');
    var preview = document.getElementById('iconPreview');
    if (select && preview) {
        select.addEventListener('change', function () {
            preview.className = this.value;
        });
    }
})();
</script>
