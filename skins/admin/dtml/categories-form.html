<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 mb-0"><[form_title]></h1>
    <a href="<[back_url]>" class="btn btn-outline-secondary"><i class="fas fa-arrow-left"></i> Torna alla lista</a>
</div>

<[if!empty error]>
<div class="alert alert-danger"><[error]></div>
<[/if!empty]>

<div class="card">
    <div class="card-body">
        <form method="post" action="<[action_url]>">
            <div class="mb-3">
                <label for="name" class="form-label fw-semibold">Nome <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="name" name="name"
                       value="<[cat_name]>" required>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label fw-semibold">Descrizione</label>
                <textarea class="form-control" id="description" name="description" rows="3"><[cat_description]></textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Salva</button>
                <a href="<[back_url]>" class="btn btn-outline-secondary">Annulla</a>
            </div>
        </form>
    </div>
</div>
