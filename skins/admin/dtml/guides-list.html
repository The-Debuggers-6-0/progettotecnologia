<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 mb-0">Guide / Operatori</h1>
    <a href="<[new_url]>" class="btn btn-primary"><i class="fas fa-user-plus"></i> Nuova guida</a>
</div>

<div class="card">
    <div class="card-body p-0">
        <[if!empty has_rows]>
        <table class="table table-hover mb-0 align-middle">
            <thead class="table-light">
                <tr>
                    <th style="width:50px"></th>
                    <th>Nome</th>
                    <th>Lingue</th>
                    <th>Email</th>
                    <th class="text-center">Esperienze</th>
                    <th class="text-center">Stato</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <[foreach]>
                <tr>
                    <td><[guide_photo]></td>
                    <td class="fw-semibold"><[guide_name]></td>
                    <td class="text-muted small"><[guide_languages]></td>
                    <td class="text-muted small"><[guide_email]></td>
                    <td class="text-center"><span class="badge bg-secondary"><[guide_exp_count]></span></td>
                    <td class="text-center"><[guide_status]></td>
                    <td class="text-end">
                        <a href="<[guide_edit_url]>" class="btn btn-sm btn-outline-secondary me-1">
                            <i class="fas fa-edit"></i>
                        </a>
                        <a href="<[guide_delete_url]>" class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Eliminare questa guida?')">
                            <i class="fas fa-trash"></i>
                        </a>
                    </td>
                </tr>
                <[/foreach]>
            </tbody>
        </table>
        <[/if!empty]>

        <[ifempty has_rows]>
        <p class="text-muted text-center py-4">Nessuna guida. <a href="<[new_url]>">Crea la prima</a>.</p>
        <[/ifempty]>
    </div>
</div>
