<div class="hero hero-inner">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-6 mx-auto text-center">
                <div class="intro-wrap">
                    <h1>Il mio account</h1>
                    <p class="text-white-50">Ciao, <[username]></p>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="untree_co-section">
    <div class="container">
        <div class="row">

            <!-- Colonna sinistra: profilo + password -->
            <div class="col-lg-4 mb-5 mb-lg-0">

                <!-- Profilo -->
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body" style="padding:1.75rem">
                        <h4 style="font-size:1.35rem;margin-bottom:1.25rem">Dati personali</h4>

                        <form method="post" id="profile-form">
                            <input type="hidden" name="action" value="profile">
                            <div class="mb-3">
                                <label class="form-label fw-semibold" style="font-size:1.05rem">Nome</label>
                                <input type="text" name="name" class="form-control" value="<[user_name]>" required style="font-size:1.05rem">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold" style="font-size:1.05rem">Cognome</label>
                                <input type="text" name="surname" class="form-control" value="<[user_surname]>" required style="font-size:1.05rem">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold" style="font-size:1.05rem">Email</label>
                                <input type="email" name="email" class="form-control" value="<[user_email]>" required style="font-size:1.05rem">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold" style="font-size:1.05rem">Username</label>
                                <input type="text" class="form-control" value="<[username]>" disabled style="font-size:1.05rem;background:#f8f9fa">
                            </div>
                            <button type="submit" class="btn btn-primary w-100" style="font-size:1.05rem">Salva modifiche</button>
                        </form>
                    </div>
                </div>

                <!-- Cambio password -->
                <div class="card border-0 shadow-sm">
                    <div class="card-body" style="padding:1.75rem">
                        <h4 style="font-size:1.35rem;margin-bottom:1.25rem">Cambia password</h4>

                        <form method="post" id="pw-form">
                            <input type="hidden" name="action" value="password">
                            <div class="mb-3">
                                <label class="form-label fw-semibold" style="font-size:1.05rem">Password attuale</label>
                                <input type="password" name="current_password" class="form-control" required style="font-size:1.05rem">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold" style="font-size:1.05rem">Nuova password</label>
                                <input type="password" name="new_password" class="form-control" required style="font-size:1.05rem">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold" style="font-size:1.05rem">Conferma password</label>
                                <input type="password" name="confirm_password" class="form-control" required style="font-size:1.05rem">
                            </div>
                            <button type="submit" class="btn btn-outline-primary w-100" style="font-size:1.05rem">Aggiorna password</button>
                        </form>
                    </div>
                </div>

            </div>

            <!-- Colonna destra: storico prenotazioni -->
            <div class="col-lg-8">
                <h2 class="section-title">Le mie prenotazioni</h2>

                <[if!empty has_bookings]>
                <div style="border-top:1px solid #f5f5f5">
                    <[bookings_html]>
                </div>
                <[/if!empty]>

                <[ifempty has_bookings]>
                <p class="text-muted" style="font-size:1.1rem">Non hai ancora nessuna prenotazione.</p>
                <a href="<[tours_url]>" class="btn btn-primary mt-2" style="font-size:1.05rem">Esplora le esperienze</a>
                <[/ifempty]>
            </div>

        </div>
    </div>
</div>
