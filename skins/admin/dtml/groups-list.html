<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0">Gruppi</h1>
    <a href="<[new_url]>" class="btn btn-success btn-sm">
        <i class="fas fa-plus-circle"></i> Nuovo gruppo
    </a>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th>Nome</th>
                    <th>Descrizione</th>
                    <th>Utenti</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <[foreach]>
                <tr>
                    <td><strong><[group_name]></strong></td>
                    <td><[group_description]></td>
                    <td><span class="badge bg-primary"><[group_user_count]></span></td>
                    <td class="text-end">
                        <a href="<[group_edit_url]>" class="btn btn-sm btn-outline-primary">
                            <i class="fas fa-edit"></i>
                        </a>
                        <a href="<[group_delete_url]>" class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Eliminare questo gruppo?')">
                            <i class="fas fa-trash"></i>
                        </a>
                    </td>
                </tr>
                <[/foreach]>
            </tbody>
        </table>
    </div>
</div>
