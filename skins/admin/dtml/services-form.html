<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0">Nuovo servizio</h1>
    <a href="<[back_url]>" class="btn btn-outline-secondary btn-sm">
        <i class="fas fa-arrow-left"></i> Torna alla lista
    </a>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">

        <[if!empty error]>
        <div class="alert alert-danger"><[error]></div>
        <[/if!empty]>

        <form method="post" action="<[action_url]>">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Username servizio <span class="text-danger">*</span></label>
                    <input type="text" name="username" class="form-control"
                           value="<[username]>" required>
                    <div class="form-text">Identificativo univoco del servizio (es. "booking-api").</div>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-warning">Crea servizio</button>
                    <a href="<[back_url]>" class="btn btn-outline-secondary ms-2">Annulla</a>
                </div>
            </div>
        </form>

    </div>
</div>
