<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 mb-0">Location</h1>
    <a href="<[new_url]>" class="btn btn-primary"><i class="fas fa-plus"></i> Nuova location</a>
</div>

<div class="card">
    <div class="card-body p-0">
        <[if!empty has_rows]>
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th>Nome</th>
                    <th>Città</th>
                    <th>Indirizzo</th>
                    <th class="text-center">Esperienze</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <[foreach]>
                <tr>
                    <td class="fw-semibold"><[loc_name]></td>
                    <td><[loc_city]></td>
                    <td class="text-muted small"><[loc_address]></td>
                    <td class="text-center"><span class="badge bg-secondary"><[loc_exp_count]></span></td>
                    <td class="text-end">
                        <a href="<[loc_edit_url]>" class="btn btn-sm btn-outline-secondary me-1">
                            <i class="fas fa-edit"></i>
                        </a>
                        <a href="<[loc_delete_url]>" class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Eliminare questa location?')">
                            <i class="fas fa-trash"></i>
                        </a>
                    </td>
                </tr>
                <[/foreach]>
            </tbody>
        </table>
        <[/if!empty]>

        <[ifempty has_rows]>
        <p class="text-muted text-center py-4">Nessuna location. <a href="<[new_url]>">Crea la prima</a>.</p>
        <[/ifempty]>
    </div>
</div>
