<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 mb-0"><[form_title]></h1>
    <a href="<[back_url]>" class="btn btn-outline-secondary"><i class="fas fa-arrow-left"></i> Torna alla lista</a>
</div>

<[if!empty error]>
<div class="alert alert-danger"><[error]></div>
<[/if!empty]>

<form method="post" action="<[action_url]>">
<div class="row g-4">

    <div class="col-lg-8">
        <div class="card">
            <div class="card-header fw-semibold">Dati location</div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-8">
                        <label for="name" class="form-label">Nome <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name"
                               value="<[loc_name]>" required>
                    </div>
                    <div class="col-md-4">
                        <label for="city" class="form-label">Città <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="city" name="city"
                               value="<[loc_city]>" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="address" class="form-label">Indirizzo</label>
                    <input type="text" class="form-control" id="address" name="address"
                           value="<[loc_address]>">
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label">Descrizione</label>
                    <textarea class="form-control" id="description" name="description"
                              rows="3"><[loc_description]></textarea>
                </div>
            </div>
        </div>
    </div>

    <div class="col-lg-4">
        <div class="card mb-4">
            <div class="card-header fw-semibold">Coordinate (opzionale)</div>
            <div class="card-body">
                <div class="mb-3">
                    <label for="latitude" class="form-label">Latitudine</label>
                    <input type="number" class="form-control" id="latitude" name="latitude"
                           value="<[loc_latitude]>" step="0.0000001" min="-90" max="90">
                </div>
                <div class="mb-3">
                    <label for="longitude" class="form-label">Longitudine</label>
                    <input type="number" class="form-control" id="longitude" name="longitude"
                           value="<[loc_longitude]>" step="0.0000001" min="-180" max="180">
                </div>
                <div class="form-text">Utili per future integrazioni con mappe.</div>
            </div>
        </div>
        <button type="submit" class="btn btn-primary w-100">Salva location</button>
    </div>

</div>
</form>
