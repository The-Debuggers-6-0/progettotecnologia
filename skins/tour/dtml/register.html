<div class="hero hero-inner">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-6 mx-auto text-center">
                <div class="intro-wrap">
                    <h1>Crea un account</h1>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="untree_co-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6">

                <[if!empty error]>
                <div class="alert alert-danger"><[error]></div>
                <[/if!empty]>

                <form method="post" action="">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="text-black" style="font-size:1.15rem">Nome</label>
                            <input type="text" class="form-control" id="name"
                                   name="name" value="<[name]>" style="font-size:1.15rem">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="surname" class="text-black" style="font-size:1.15rem">Cognome</label>
                            <input type="text" class="form-control" id="surname"
                                   name="surname" value="<[surname]>" style="font-size:1.15rem">
                        </div>
                        <div class="col-12 mb-3">
                            <label for="username" class="text-black" style="font-size:1.15rem">Username <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="username"
                                   name="username" value="<[username]>" required autofocus style="font-size:1.15rem">
                        </div>
                        <div class="col-12 mb-3">
                            <label for="email" class="text-black" style="font-size:1.15rem">Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" id="email"
                                   name="email" value="<[email]>" required style="font-size:1.15rem">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="password" class="text-black" style="font-size:1.15rem">Password <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="password"
                                   name="password" required minlength="8" style="font-size:1.15rem">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="password_confirm" class="text-black" style="font-size:1.15rem">Conferma password <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="password_confirm"
                                   name="password_confirm" required minlength="8" style="font-size:1.15rem">
                        </div>
                        <div class="col-12 mb-3">
                            <input type="submit" class="btn btn-primary btn-block" value="Crea account" style="font-size:1.15rem">
                        </div>
                    </div>
                </form>

                <p class="text-center mt-3" style="font-size:1.15rem">
                    Hai già un account? <a href="<[base]>/login.php">Accedi</a>
                </p>

            </div>
        </div>
    </div>
</div>
